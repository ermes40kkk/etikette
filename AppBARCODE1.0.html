<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code128 Etiketten Generator 1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 12mm;
        color: #000;
      }

      .controls {
        border: 2px solid #000;
        padding: 12px;
        margin-bottom: 16px;
      }

      .controls h2 {
        margin: 0 0 12px 0;
        font-size: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 10px 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
      }

      .field.checkbox-field {
        justify-content: flex-end;
      }

      .field label {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .field input[type="text"],
      .field input[type="number"],
      .field select {
        padding: 7px 8px;
        font-size: 14px;
        border: 1px solid #000;
        background: #fff;
      }

      .field input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-top: 8px;
      }

      .input-with-stepper {
        display: flex;
        align-items: stretch;
        width: 100%;
      }

      .stepper-buttons {
        display: flex;
        flex-direction: column;
        margin-right: 4px;
      }

      .stepper-button {
        width: 28px;
        min-width: 28px;
        height: 18px;
        padding: 0;
        font-size: 11px;
        line-height: 1;
        border: 1px solid #000;
        background: #fff;
        cursor: pointer;
      }

      .stepper-button + .stepper-button {
        border-top: 0;
      }

      .input-with-stepper input {
        width: 100%;
      }

      .inline-checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 5px;
        font-size: 12px;
        font-weight: 400;
      }

      .inline-checkbox input[type="checkbox"] {
        width: 15px;
        height: 15px;
        margin: 0;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        padding: 9px 14px;
        font-size: 14px;
        font-weight: 700;
        border: 1px solid #000;
        background: #fff;
        cursor: pointer;
      }

      button.stepper-button {
        width: 28px;
        min-width: 28px;
        height: 18px;
        padding: 0;
        font-size: 11px;
        line-height: 1;
      }

      .labels {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .label {
        width: var(--label-width, 19cm);
        height: var(--label-height, 5.4cm);
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        padding: var(--label-padding, 0.35cm 0.45cm);
        border: 2px solid #000;
        overflow: hidden;
        page-break-inside: avoid;
        break-inside: avoid;
        margin: 0;
      }

      .barcode-area {
        width: var(--barcode-area-width, 6.5cm);
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: var(--barcode-gap, 0.12cm);
        overflow: hidden;
      }

      .top-barcode-label {
        display: none;
        width: 100%;
        font-size: var(--top-label-size, 15pt);
        font-weight: 200;
        line-height: 1;
		letter-spacing: -1px;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .show-top-label .top-barcode-label {
        display: block;
      }

      .show-barcode-text .barcode-area {
        width: 100%;
        align-items: center;
        justify-content: center;
      }

      .barcode-svg {
        width: 100%;
        height: var(--barcode-height, 3.2cm);
        flex-shrink: 0;
      }

      .show-barcode-text .barcode-svg {
        width: auto;
        max-width: 100%;
      }
      .barcode-text-row {
        display: none;
        width: 100%;
        align-items: center;
        justify-content: center;
        gap: var(--arrow-gap, 0.18cm);
      }

      .barcode-text {
        font-size: var(--barcode-text-size, 14pt);
        font-weight: 500;
        line-height: 1;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .arrow-indicator {
        display: none;
        font-size: var(--arrow-size, 22pt);
		
		  font-family: Arial, sans-serif;
  font-weight: 200;

  margin-left: 0.08em;
  line-height: 1;
  transform: translateY(0.05em);

      }

      .has-arrow .arrow-indicator {
        display: inline-block;
      }

      .show-barcode-text .barcode-text-row {
        display: flex;
      }

      .show-barcode-text .text-area {
        display: none;
      }

      .text-area {
        width: calc(100% - var(--barcode-area-width, 6.5cm) - 0.5cm);
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: left;
        font-size: var(--label-font-size, 39pt);
        font-weight: 500;
		letter-spacing: -1px;
        line-height: 1.05;
        overflow-wrap: anywhere;
        padding-left: 0.3cm;
      }

      @page {
        size: auto;
        margin: 0;
      }

      @media print {
        body {
          margin: 0;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .controls {
          display: none !important;
        }

        .labels {
          gap: 0 !important;
        }

        .label {
          border: 2px solid #000 !important;
          margin: 0 !important;
        }
      }
    </style>
  </head>

    <script>
      function padNumber(value, digits) {
        return String(value).padStart(digits, "0");
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      const stepperSettings = {
        labelWidth: { step: 0.1, min: 0 },
        labelHeight: { step: 0.1, min: 0 },
        barcodeAreaWidth: { step: 0.1, min: 0 },
        barcodeHeight: { step: 0.1, min: 0 },
        labelFontSize: { step: 1, min: 1 },
        barcodeTextSize: { step: 1, min: 1 },
        labelPadding: { step: 0.05, min: 0 },
        barcodeGap: { step: 0.01, min: 0 },
        topLabelSize: { step: 1, min: 1 },
        arrowSize: { step: 1, min: 1 },
        arrowGap: { step: 0.01, min: 0 },
      };

      function decimalPlaces(value) {
        const parts = String(value).split(".");
        return parts.length > 1 ? parts[1].length : 0;
      }

      function adjustNumericTextValue(value, direction, settings) {
        const step = settings.step;
        const min = settings.min;
        const precision = decimalPlaces(step);
        const numberPattern = /-?\d+(?:\.\d+)?/g;
        let foundNumber = false;

        const adjustedValue = value.replace(numberPattern, (numberText) => {
          foundNumber = true;
          const currentValue = parseFloat(numberText);
          const nextValue = Math.max(min, currentValue + direction * step);
          const decimals = Math.max(decimalPlaces(numberText), precision);
          return nextValue.toFixed(decimals).replace(/\.?0+$/, "");
        });

        return foundNumber ? adjustedValue : value;
      }

      function setupAutoGenerateControls() {
        const controls = document.querySelector(".controls");

        controls.addEventListener("input", (event) => {
          if (event.target.matches("input, select")) {
            generateLabels();
          }
        });

        controls.addEventListener("change", (event) => {
          if (event.target.matches("input, select")) {
            generateLabels();
          }
        });

        controls.addEventListener("click", (event) => {
          const button = event.target.closest(".stepper-button");
          if (!button) {
            return;
          }

          const input = document.getElementById(button.dataset.stepTarget);
          const settings = stepperSettings[button.dataset.stepTarget];
          if (!input || !settings) {
            return;
          }

          const direction = button.dataset.stepDirection === "up" ? 1 : -1;
          input.value = adjustNumericTextValue(input.value, direction, settings);
          generateLabels();
        });
      }

      function generateLabels() {
        const prefix = document.getElementById("prefix").value.trim();
        const middle = document.getElementById("middle").value.trim();
        const suffix = document.getElementById("suffix").value.trim();
        const hidePrefixInLabel = document.getElementById(
          "hidePrefixInLabel",
        ).checked;
        const hideMiddleInLabel = document.getElementById(
          "hideMiddleInLabel",
        ).checked;
        const hideSuffixInLabel = document.getElementById(
          "hideSuffixInLabel",
        ).checked;

        const digits = parseInt(document.getElementById("digits").value, 10);
        const start = parseInt(document.getElementById("start").value, 10);
        const end = parseInt(document.getElementById("end").value, 10);

        const labelWidth = document.getElementById("labelWidth").value.trim();
        const labelHeight = document.getElementById("labelHeight").value.trim();
        const barcodeAreaWidth = document
          .getElementById("barcodeAreaWidth")
          .value.trim();
        const barcodeHeight = document
          .getElementById("barcodeHeight")
          .value.trim();
        const barWidth = parseFloat(document.getElementById("barWidth").value);
        const labelFontSize = document
          .getElementById("labelFontSize")
          .value.trim();
        const barcodeTextSize = document
          .getElementById("barcodeTextSize")
          .value.trim();
        const labelPadding = document
          .getElementById("labelPadding")
          .value.trim();
        const barcodeGap = document.getElementById("barcodeGap").value.trim();
        const showTextUnderBarcode = document.getElementById(
          "showTextUnderBarcode",
        ).checked;
       const showTopBarcodeLabel = document.getElementById(
          "showTopBarcodeLabel",
        ).checked;
    //    const topBarcodeLabel = document
    //      .getElementById("topBarcodeLabel")
    //      .value.trim();
        const topLabelSize = document
          .getElementById("topLabelSize")
          .value.trim();
        const arrowDirection = document.getElementById("arrowDirection").value;
        const arrowSize = document.getElementById("arrowSize").value.trim();
        const arrowGap = document.getElementById("arrowGap").value.trim();

        const labelsContainer = document.getElementById("labels");
        labelsContainer.innerHTML = "";

        document.documentElement.style.setProperty("--label-width", labelWidth);
        document.documentElement.style.setProperty(
          "--label-height",
          labelHeight,
        );
        document.documentElement.style.setProperty(
          "--barcode-area-width",
          barcodeAreaWidth,
        );
        document.documentElement.style.setProperty(
          "--barcode-height",
          barcodeHeight,
        );
        document.documentElement.style.setProperty(
          "--label-font-size",
          labelFontSize,
        );
        document.documentElement.style.setProperty(
          "--barcode-text-size",
          barcodeTextSize,
        );
        document.documentElement.style.setProperty(
          "--label-padding",
          labelPadding,
        );
        document.documentElement.style.setProperty("--barcode-gap", barcodeGap);
        document.documentElement.style.setProperty(
          "--top-label-size",
          topLabelSize,
        );
        document.documentElement.style.setProperty("--arrow-size", arrowSize);
        document.documentElement.style.setProperty("--arrow-gap", arrowGap);

        if (isNaN(start) || isNaN(end) || isNaN(digits) || start > end) {
          alert("Bitte Startnummer, Endnummer und Stellen prüfen.");
          return;
        }

        for (let i = start; i <= end; i++) {
          const progressive = padNumber(i, digits);

          const labelParts = [];
          if (!hidePrefixInLabel && prefix !== "") {
            labelParts.push(prefix);
          }
          if (!hideMiddleInLabel && middle !== "") {
            labelParts.push(middle);
          }
          labelParts.push(progressive);
          if (!hideSuffixInLabel && suffix !== "") {
            labelParts.push(suffix);
          }

          const labelText = labelParts.join("-");
          const barcodeText = `${prefix}${middle}${progressive}${suffix}`;
          const safeLabelText = escapeHtml(labelText);
          const safeTopBarcodeLabel =  prefix ;  // escapeHtml(topBarcodeLabel);

          const label = document.createElement("div");
          label.className = "label";

          if (showTextUnderBarcode) {
            label.classList.add("show-barcode-text");
          }

          if (showTopBarcodeLabel && prefix !== "") {
            label.classList.add("show-top-label");
          }

          const arrowSymbol =
            arrowDirection === "up"
              ? "⬆︎"
              : arrowDirection === "down"
                ? "⬇︎"
                : "";
          if (arrowSymbol !== "") {
            label.classList.add("has-arrow");
          }

          const barcodeId = `barcode-${i}`;

          label.innerHTML = `
  <div class="barcode-area">
    <div class="top-barcode-label">${safeTopBarcodeLabel}</div>
    <svg id="${barcodeId}" class="barcode-svg"></svg>
    <div class="barcode-text-row">
      <span class="barcode-text">${safeLabelText}</span>
	  <span class="arrow-indicator">${arrowSymbol}</span>
    </div>
  </div>
  ${showTextUnderBarcode ? "" : `<div class="text-area">${safeLabelText}  <span class="arrow-indicator">${arrowSymbol}</span></div>`}
`;

          labelsContainer.appendChild(label);

          JsBarcode(`#${barcodeId}`, barcodeText, {
            format: "CODE128",
            displayValue: false,
            height: 80,
            width: barWidth,
            margin: 0,
          });
        }
      }

      setupAutoGenerateControls();
      generateLabels();
    </script>
  </body>
</html>
